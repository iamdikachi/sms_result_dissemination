<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Emerald Glow Gradient -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Drop Shadows & Glow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.3" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Subtle inner border glow -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#3b82f6" stroke-width="4" stroke-opacity="0.2" />

  <!-- Main visual group -->
  <g filter="url(#shadow)">
    <!-- 1. The SMS Chat Bubble -->
    <path d="M 120 380 
             L 80 420 
             C 75 425, 70 420, 72 414 
             L 96 364 
             C 80 344, 70 318, 70 290 
             C 70 207, 146 140, 240 140 
             C 334 140, 410 207, 410 290 
             C 410 373, 334 440, 240 440 
             C 194 440, 152 417, 120 380 Z" 
          fill="url(#emerald-grad)" />

    <!-- 2. Shadow under the graduation cap -->
    <polygon points="240,180 360,225 240,270 120,225" fill="#000000" opacity="0.15" />

    <!-- 3. Graduation Cap Base/Skullcap -->
    <path d="M 170 232
             V 265
             C 170 295, 310 295, 310 265
             V 232
             L 240 258
             Z" 
          fill="#f8fafc" />

    <!-- 4. Graduation Cap Top (Rhombus) -->
    <polygon points="240,170 360,215 240,260 120,215" fill="#ffffff" />
    
    <!-- 5. Tassel -->
    <path d="M 240 215 
             L 330 230 
             L 345 285" 
          fill="none" 
          stroke="url(#gold-grad)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    <circle cx="345" cy="290" r="10" fill="url(#gold-grad)" />

    <!-- 6. AI Sparks/Stars -->
    <path d="M 390 110 
             Q 390 140, 420 140 
             Q 390 140, 390 170 
             Q 390 140, 360 140 
             Q 390 140, 390 110 Z" 
          fill="url(#gold-grad)" 
          filter="url(#glow)" />

    <path d="M 350 85 
             Q 350 100, 365 100 
             Q 350 100, 350 115 
             Q 350 100, 335 100 
             Q 350 100, 350 85 Z" 
          fill="#ffffff" 
          opacity="0.9" />
  </g>
</svg>
